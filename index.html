<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak! 🎉</title>
<style>
  :root {
    --primary: #FF4500;
    --secondary: #FFDAB9;
    --text: #FFF;
    --card: rgba(0, 0, 0, 0.22);
    --shadow: rgba(0, 0, 0, 0.35);
  }

  html,
  body {
    height: 100%;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }

  body {
    background: radial-gradient(circle at top, #FFB380 0%, #FF4500 40%, #8B0000 100%);
  }

  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    text-align: center;
  }

  .card {
    width: min(520px, 90%);
    background: var(--card);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 24px;
    padding: 2.5rem 2rem;
    box-shadow: 0 20px 60px var(--shadow);
    backdrop-filter: blur(15px);
  }

  h1 {
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    margin: 0;
    letter-spacing: 0.03em;
    text-shadow: 0 4px 18px rgba(0, 0, 0, 0.55);
    animation: floatText 8s ease-in-out infinite;
  }

  @keyframes floatText {
    0%,
    100% {
      transform: translateY(0);
    }
    50% {
      transform: translateY(-3px);
    }
  }

  p {
    margin: 1rem 0 1.5rem;
    font-size: 1.1rem;
    line-height: 1.5;
    opacity: 0.9;
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1rem;
    margin-top: 1.5rem;
  }

  button {
    --btnGradient: linear-gradient(135deg, rgba(255, 97, 0, 1), rgba(255, 200, 0, 1));
    padding: 0.85rem 1.75rem;
    font-size: 1.1rem;
    font-weight: 600;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    background: var(--btnGradient);
    color: #111;
    box-shadow: 0 16px 30px rgba(0, 0, 0, 0.35);
    transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 20px 35px rgba(0, 0, 0, 0.45);
    filter: brightness(1.05);
  }

  button:active {
    transform: translateY(0);
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
  }

  .hint {
    margin-top: 1.5rem;
    font-size: 0.95rem;
    opacity: 0.85;
  }

  .balloon {
    position: absolute;
    bottom: -120px;
    width: 48px;
    height: 68px;
    border-radius: 50% 50% 52% 52%;
    background: red;
    box-shadow: inset -4px -6px 10px rgba(0, 0, 0, 0.2), 0 10px 20px rgba(0, 0, 0, 0.25);
    filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.25));
  }

  .balloon::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 68%;
    width: 6px;
    height: 40px;
    background: rgba(255, 255, 255, 0.45);
    border-radius: 999px;
    transform: translateX(-50%);
  }

  @keyframes float {
    0% {
      transform: translateY(0) rotate(0deg);
    }
    100% {
      transform: translateY(-120vh) rotate(360deg);
    }
  }

  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(255, 255, 255, 0.7);
    opacity: 0;
    animation: starTwinkle 6s infinite;
  }

  @keyframes starTwinkle {
    0%,
    100% {
      opacity: 0;
      transform: scale(0.6);
    }
    50% {
      opacity: 1;
      transform: scale(1.2);
    }
  }

  @keyframes confettiFall {
    to {
      transform: translateY(100vh) rotate(360deg);
      opacity: 0;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    * {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
  }
</style>
</head>
<body>

<div class="page">
  <div class="card">
    <h1>Eid Mubarak! 🌙✨</h1>
    <p>Wishing you joy, peace, and blessings on this beautiful day. Tap the button to celebrate with balloons & confetti!</p>
    <div class="actions">
      <button id="celebrateBtn">🎉 Celebrate Eid</button>
      <button id="resetBtn" type="button">♻️ Clear</button>
    </div>
    <p class="hint">Tip: Click the button multiple times for more fun.</p>
  </div>
</div>

<audio id="eidSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
  const eidSound = document.getElementById('eidSound');
  const celebrateBtn = document.getElementById('celebrateBtn');
  const resetBtn = document.getElementById('resetBtn');

  // Floating balloons
  function createBalloons(count = 12) {
    const colors = ['#FF0000', '#00FF00', '#0000FF', '#FFFF00', '#FF69B4', '#00FFFF'];
    for (let i = 0; i < count; i++) {
      const balloon = document.createElement('div');
      balloon.classList.add('balloon');
      balloon.style.left = Math.random() * window.innerWidth + 'px';
      balloon.style.background = colors[Math.floor(Math.random() * colors.length)];
      balloon.style.animationDuration = (6 + Math.random() * 4) + 's';
      document.body.appendChild(balloon);
      setTimeout(() => balloon.remove(), 9000);
    }
  }

  // Sparkling stars in the background
  function createStars(count = 25) {
    for (let i = 0; i < count; i++) {
      const star = document.createElement('div');
      star.classList.add('star');
      star.style.left = Math.random() * window.innerWidth + 'px';
      star.style.top = Math.random() * window.innerHeight + 'px';
      star.style.animationDelay = Math.random() * 6 + 's';
      star.style.width = `${1 + Math.random() * 3}px`;
      star.style.height = star.style.width;
      document.body.appendChild(star);
      setTimeout(() => star.remove(), 12000);
    }
  }

  // Confetti burst
  function createConfetti(count = 60) {
    for (let i = 0; i < count; i++) {
      const confetti = document.createElement('div');
      confetti.style.position = 'absolute';
      confetti.style.width = `${6 + Math.random() * 8}px`;
      confetti.style.height = `${6 + Math.random() * 8}px`;
      confetti.style.background = `hsl(${Math.random() * 360}, 75%, 55%)`;
      confetti.style.top = '0px';
      confetti.style.left = Math.random() * window.innerWidth + 'px';
      confetti.style.borderRadius = `${Math.random() > 0.5 ? 50 : 0}%`;
      confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
      confetti.style.animation = `confettiFall ${4 + Math.random() * 2}s cubic-bezier(.25,.65,.58,1) forwards`;
      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), 7000);
    }
  }

  function celebrateEid() {
    eidSound.currentTime = 0;
    eidSound.play();
    createStars(14);
    createBalloons(10);
    createConfetti(36);
  }

  function clearFestivities() {
    document.querySelectorAll('.balloon, .star').forEach(el => el.remove());
    document.querySelectorAll('body > div[style]').forEach(el => el.remove());
    eidSound.pause();
    eidSound.currentTime = 0;
  }

  document.addEventListener('DOMContentLoaded', () => {
    createStars(12);
    celebrateBtn.addEventListener('click', celebrateEid);
    resetBtn.addEventListener('click', clearFestivities);
  });
</script>

</body>
</html>
